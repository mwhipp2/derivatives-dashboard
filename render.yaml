services:
  - type: web
    name: derivatives-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: WATCHLIST
        value: ORCL,PLTR,SOFI,BAC,NKE,WMT,NVDA
